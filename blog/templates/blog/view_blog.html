{% extends 'base.html' %}

{% block content %}
<div class="post">
    <h2>{{ blog.title }}</h2>
    <img src="{{ blog.photo.image.url }}">
    <p>{{ blog.photo.caption }}</p>
    <p>{{ blog.content }}</p>
    <p>Auteur : {{ blog.contributors.all|join:", " }}</p>
    {% if perms.blog.add_blog %}
    <p><a href="{% url 'blog-edit' blog.id %}">Modifier le billet</a></p>
    {% endif %}
</div>


{% endblock content %}
