{% extends 'base.html' %}

{% block content %}
<div class="post">
    <h2>{{ blog.title }}</h2>
    <img src="{{ blog.photo.image.url }}">
    <p>{{ blog.photo.caption }}</p>
    <p>{{ blog.content }}</p>
    <p>Auteur : {{blog.author}}</p>
    <p><a href="{% url 'blog-edit' blog.id %}">Modifier le billet</a></p>
</div>


{% endblock content %}
