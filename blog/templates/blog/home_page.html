{% extends 'base.html' %}

{% block content %}

<h2 class="home_title">Votre flux</h2>

<div class="grid-container">

    {% for blog in blogs %}
    <div>
        <a href="{% url 'blog-view' blog.id %}">
            <h4>Billet : {{ blog.title }}</h4>
            <img src="{{ blog.photo.image.url }}">
        </a>
    </div>
    {% endfor %}

</div>

{% endblock content %}
